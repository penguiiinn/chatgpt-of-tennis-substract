<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AceIntel - Trending Players</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 20px;
    }
    .trending-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .trending-header h1 {
      font-size: 2rem;
      margin: 0 0 10px;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbf1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .surface-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .surface-tab {
      padding: 8px 20px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #8b949e;
      cursor: pointer;
      border-radius: 6px;
      font-weight: 500;
    }
    .surface-tab.active {
      background: #238636;
      color: #fff;
      border-color: #238636;
    }
    .trending-grid {
      display: grid;
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }
    .trending-card {
      display: grid;
      grid-template-columns: 50px 1fr auto;
      gap: 15px;
      align-items: center;
      padding: 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    .trending-rank {
      font-size: 1.5rem;
      font-weight: 700;
      color: #8b949e;
      text-align: center;
    }
    .trending-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .trending-name {
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .trending-label {
      font-size: 0.85rem;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    .label-HOT { background: #ff4757; color: #fff; }
    .label-RISING { background: #2ed573; color: #000; }
    .label-DANGEROUS { background: #ffa502; color: #000; }
    .label-SLUMPING { background: #5352ed; color: #fff; }
    .label-NEUTRAL { background: #30363d; color: #8b949e; }
    .last10 {
      display: flex;
      gap: 3px;
    }
    .last10 span {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .last10 .W { background: #2ed573; color: #000; }
    .last10 .L { background: #ff4757; color: #fff; }
    .trending-stats {
      display: flex;
      gap: 15px;
      font-size: 0.85rem;
      color: #8b949e;
    }
    .stat-value {
      color: #e6edf3;
      font-weight: 600;
    }
    .trend-score {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
    }
    .score-number {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(180deg, #48dbf1, #0abde3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .score-label {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="trending-header">
    <h1>Trending Players</h1>
    <p>Live momentum + historical intelligence</p>
  </div>

  <div class="surface-tabs">
    <button class="surface-tab active" data-surface="hard">Hard</button>
    <button class="surface-tab" data-surface="clay">Clay</button>
    <button class="surface-tab" data-surface="grass">Grass</button>
  </div>

  <div id="trending-list" class="trending-grid">
    <div class="loading">Loading trending players...</div>
  </div>

  <script>
    const API_BASE = "https://aceintel-backend.onrender.com";

    async function loadTrending(surface = 'hard') {
      const container = document.getElementById('trending-list');
      container.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const res = await fetch(`${API_BASE}/api/trending?surface=${surface}&limit=10`);
        const data = await res.json();

        if (!data.players || data.players.length === 0) {
          container.innerHTML = '<div class="loading">No trending players found</div>';
          return;
        }

        container.innerHTML = data.players.map((p, idx) => `
          <div class="trending-card">
            <div class="trending-rank">#${p.rank}</div>
            <div class="trending-info">
              <div class="trending-name">
                ${p.name}
                <span class="trending-label label-${p.labelOnly}">${p.label}</span>
              </div>
              <div class="last10">
                ${p.last10.map(r => `<span class="${r}">${r}</span>`).join('')}
              </div>
              <div class="trending-stats">
                <div>Form: <span class="stat-value">${p.recentForm}%</span></div>
                <div>Streak: <span class="stat-value">${p.winStreak}</span></div>
                <div>${surface}%: <span class="stat-value">${p.surfaceWinPct}%</span></div>
              </div>
            </div>
            <div class="trend-score">
              <div class="score-number">${p.trendScore}</div>
              <div class="score-label">Momentum</div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = `<div class="loading">Error: ${err.message}</div>`;
      }
    }

    // Surface tabs
    document.querySelectorAll('.surface-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.surface-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadTrending(tab.dataset.surface);
      });
    });

    // Initial load
    loadTrending('hard');
  </script>
</body>
</html>
